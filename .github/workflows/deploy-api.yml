name: Deploy API (EC2)

# Deploys admin API to EC2 (16.16.251.27) on push to main that touches API files,
# or on any release tag (v*.*.*).
on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
    tags:
      - 'v*.*.*'
  workflow_dispatch: # manual trigger from GitHub Actions UI

concurrency:
  group: deploy-api
  cancel-in-progress: false # never cancel an in-flight API deploy

jobs:
  test:
    name: Test API before deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: '**/pnpm-lock.yaml'

      - run: pnpm install --frozen-lockfile

      - name: Typecheck API
        run: pnpm --filter @snaptik/api run typecheck

      - name: Run API tests
        run: pnpm --filter @snaptik/api run test --passWithNoTests
        env:
          NODE_ENV: test
          MONGODB_URI: ${{ secrets.TEST_MONGODB_URI }}
          JWT_SECRET: test-secret-at-least-32-characters-long

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    environment:
      name: production-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API Docker image
        run: |
          docker build \
            -t snaptik-admin-api:${{ github.ref_name }} \
            -t snaptik-admin-api:latest \
            -f apps/api/Dockerfile \
            .

      - name: Save Docker image
        run: docker save snaptik-admin-api:latest | gzip > /tmp/snaptik-admin-api.tar.gz

      - name: Copy image to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.ADMIN_EC2_HOST }}
          username: ${{ secrets.ADMIN_EC2_USER }}
          key:      ${{ secrets.ADMIN_EC2_SSH_KEY }}
          source:   /tmp/snaptik-admin-api.tar.gz
          target:   /tmp/

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.ADMIN_EC2_HOST }}
          username: ${{ secrets.ADMIN_EC2_USER }}
          key:      ${{ secrets.ADMIN_EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/snaptik-admin

            echo "=== Loading Docker image ==="
            docker load < /tmp/snaptik-admin-api.tar.gz

            echo "=== Restarting via docker compose ==="
            docker compose -f docker-compose.production.yml up -d --no-deps api

            echo "=== Health check ==="
            sleep 8
            curl -sf http://localhost:5001/health || (docker compose -f docker-compose.production.yml logs api --tail 50 && exit 1)

            echo "=== Cleanup ==="
            docker image prune -f
            rm /tmp/snaptik-admin-api.tar.gz

            echo "=== Done: ${{ github.ref_name }} deployed ==="

# ──────────────────────────────────────────────────────────────────────────────
# Required GitHub Secrets (repo Settings → Secrets and variables → Actions):
#
#   ADMIN_EC2_HOST     = 16.16.251.27
#   ADMIN_EC2_USER     = ubuntu
#   ADMIN_EC2_SSH_KEY  = (paste full contents of snaptik-prod-ssh-key2.pem)
#   TEST_MONGODB_URI   = mongodb://snaptik_admin:<pw>@localhost:27017/snaptik_admin_test?authSource=admin
#
# The production env is stored in /home/ubuntu/snaptik-admin.env on the EC2.
# See scripts/ec2-env-template.sh for the exact values to set.
# ──────────────────────────────────────────────────────────────────────────────
