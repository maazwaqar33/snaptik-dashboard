name: Deploy Web (Vercel)

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'

# Only one deploy at a time — subsequent pushes cancel the in-flight deploy
concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: '**/pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      # Pull Vercel project settings & env vars
      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/web

      # Build using Vercel's build pipeline (respects output config)
      - name: Build project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      # Deploy pre-built output
      - name: Deploy to production
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
        working-directory: apps/web

      - name: Comment deployment URL on commit
        uses: actions/github-script@v7
        with:
          script: |
            const sha  = context.sha.slice(0, 7);
            const url  = '${{ steps.deploy.outputs.url }}';
            core.notice(`Deployed ${ sha } → ${ url }`);

# Required secrets (add in repo Settings → Secrets):
#   VERCEL_TOKEN        — Vercel personal access token
#   VERCEL_ORG_ID       — from `vercel whoami`
#   VERCEL_PROJECT_ID   — from .vercel/project.json after `vercel link`
#   NEXT_PUBLIC_API_URL — admin API base URL
