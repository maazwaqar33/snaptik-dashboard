name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: '**/pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Scope to web + shared packages only — api has no source yet (built in separate phase)
      - name: Typecheck (web + packages)
        run: pnpm turbo typecheck --filter=@snaptik/web... --filter=@snaptik/types... --filter=@snaptik/ui...

      - name: Lint (web + packages)
        run: pnpm turbo lint --filter=@snaptik/web... --filter=@snaptik/types... --filter=@snaptik/ui...

      - name: Build (web production)
        run: pnpm turbo build --filter=@snaptik/web...
        env:
          # Next.js build needs a placeholder — real values injected by Vercel
          NEXT_PUBLIC_API_URL: http://localhost:5001/api/v1

      - name: Upload build artefacts
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: web-build-${{ github.sha }}
          path: apps/web/.next
          retention-days: 3
